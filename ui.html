<!--//////////////////////// STYLE ////////////////////////-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/thomas-lowry/figma-plugin-ds/dist/figma-plugin-ds.css">
<style>
  .section-title {
    flex: 1 0 0;
    margin: 0;
    padding: 0;

  }

  .plugin-section {
    display: flex;
    padding: 12px 16px;
    align-items: flex-start;
    gap: 0px;
    align-self: stretch;
    border-bottom: 0.5px solid #CCC;
  }

  .radio-group {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    flex: 1 0 0;
  }

  .radio {
    height: 24px;
    margin-left: -4px;
  }

  .input {
    display: flex;
    height: 32px;
    justify-content: center;
    align-items: center;
    flex: 1 0 0;
  }

  .button-section {
    display: flex;
    padding: 16px;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    align-self: stretch;
  }

  .button {
    display: flex;
    justify-content: center;
    align-items: center;
    align-self: stretch;
  }

  .button--primary:active {
    background-color: #005AC4;
  }

  .button--primary:focus,
  .button--primary:focus-visible,
  .button--primary:active {
    border-color: transparent !important;
    outline: none;
  }

.text--secondary {
  color: #515151;
}

  .status-count {
    color: #18A0FB;
    font-weight: bold;
  }

</style>

<!--//////////////////////// BODY ////////////////////////-->

<div class="plugin-section">
  <div class="type section-title">Gender</div>
  <div class="radio-group">
    <!-- Radio -->
    <div class="radio">
      <input id="radioRandom" type="radio" class="radio__button" value="random" name="radioGroup" checked>
      <label for="radioRandom" class="radio__label">Random</label>
    </div>
    <div class="radio">
      <input id="radioFemale" type="radio" class="radio__button" value="female" name="radioGroup">
      <label for="radioFemale" class="radio__label">Female</label>
    </div>
    <div class="radio">
      <input id="radioMale" type="radio" class="radio__button" value="male" name="radioGroup">
      <label for="radioMale" class="radio__label">Male</label>
    </div>
  </div>
</div>


<div class="plugin-section">
  <div class="type section-title">Format</div>
  <!-- Switch -->
  <div class="switch">
    <input class="switch__toggle" type="checkbox" id="surname" checked>
    <label class="switch__label" for="surname">Surname</label>
  </div>
</div>


<div class="plugin-section">
  <div class="type section-title">New layers</div>
  <!-- Number input -->
  <div class="input">
    <input type="number" class="input__field" placeholder="0 (Max 50)">
  </div>
</div>

<div class="button-section">
  <!-- Button -->
  <button class='button button--primary'>Generate</button>
  <div id="statusMsg" class="type text--secondary">Select layers or set a count above</div>
</div>


<!--//////////////////////// SCRIPT ////////////////////////-->
<script>
  const generateBtn = document.querySelector('.button--primary');
  const newLayersInput = document.querySelector('.input__field');
  let hasValidSelection = false;

  const statusMsg = document.getElementById('statusMsg');
  let selectionCount = 0;

  generateBtn.disabled = true;
  generateBtn.textContent = 'Nothing to generate';

  function updateButtonState() {
    const inputCount = parseInt(newLayersInput.value) || 0;
    const canGenerate = hasValidSelection || inputCount > 0;
    generateBtn.disabled = !canGenerate;
    generateBtn.textContent = canGenerate ? 'Generate' : 'Nothing to generate';

    if (!canGenerate) {
      statusMsg.textContent = 'Select layers or set a count above';
    } else if (hasValidSelection && inputCount > 0) {
      statusMsg.innerHTML = `${num(selectionCount)} selected + ${num(inputCount)} new ${layers(inputCount)}`;
    } else if (hasValidSelection) {
      statusMsg.innerHTML = `${num(selectionCount)} ${layers(selectionCount)} selected`;
    } else {
      statusMsg.innerHTML = `${num(inputCount)} new ${layers(inputCount)} to create`;
    }
  }

  function layers(n) {
    return n === 1 ? 'layer' : 'layers';
  }

  function num(n) {
    return `<span class="status-count">${n}</span>`;
  }

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'selectionchange') {
      hasValidSelection = msg.hasValidSelection;
      selectionCount = msg.selectionCount;
      updateButtonState();
    }
  };

  newLayersInput.addEventListener('input', () => {
    updateButtonState();
  });

  newLayersInput.addEventListener('blur', () => {
    const val = parseInt(newLayersInput.value) || 0;
    newLayersInput.value = Math.min(Math.max(val, 0), 50);
    updateButtonState();
  });
  
  generateBtn.addEventListener('click', () => {
    const gender = document.querySelector('input[name="radioGroup"]:checked').value;
    const includeSurname = document.getElementById('surname').checked;
    const newLayersCount = parseInt(newLayersInput.value) || 0;

    parent.postMessage({
      pluginMessage: { type: 'generate', gender, includeSurname, newLayersCount }
    }, '*');
  });


</script>
